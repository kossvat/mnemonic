<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#6366f1" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#6366f1" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#6366f1" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#6366f1" stroke-width="1"/>
  </g>

  <!-- Brain/memory icon (larger) -->
  <g transform="translate(540, 160)">
    <circle cx="100" cy="100" r="70" fill="none" stroke="url(#g)" stroke-width="3" opacity="0.8"/>
    <path d="M72 100 C72 76, 100 60, 100 84 C100 60, 128 76, 128 100 C128 124, 100 140, 100 116 C100 140, 72 124, 72 100Z" fill="url(#g)" opacity="0.15"/>
    <circle cx="85" cy="88" r="7" fill="url(#g)" opacity="0.7"/>
    <circle cx="115" cy="88" r="7" fill="url(#g)" opacity="0.7"/>
    <circle cx="100" cy="115" r="7" fill="url(#g)" opacity="0.7"/>
    <line x1="85" y1="88" x2="100" y2="115" stroke="url(#g)" stroke-width="2" opacity="0.5"/>
    <line x1="115" y1="88" x2="100" y2="115" stroke="url(#g)" stroke-width="2" opacity="0.5"/>
    <line x1="85" y1="88" x2="115" y2="88" stroke="url(#g)" stroke-width="2" opacity="0.5"/>
    <!-- Outer connection dots -->
    <circle cx="55" cy="70" r="4" fill="#6366f1" opacity="0.3"/>
    <circle cx="145" cy="70" r="4" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="55" cy="130" r="4" fill="#6366f1" opacity="0.3"/>
    <circle cx="145" cy="130" r="4" fill="#8b5cf6" opacity="0.3"/>
    <line x1="55" y1="70" x2="85" y2="88" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
    <line x1="145" y1="70" x2="115" y2="88" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
    <line x1="55" y1="130" x2="100" y2="115" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
    <line x1="145" y1="130" x2="100" y2="115" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Title -->
  <text x="640" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="url(#g)">mnemonic</text>

  <!-- Tagline -->
  <text x="640" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">Background memory daemon for AI coding agents</text>

  <!-- Tech badges -->
  <g transform="translate(390, 510)">
    <rect x="0" y="0" width="80" height="30" rx="6" fill="#6366f1" opacity="0.2"/>
    <text x="40" y="20" text-anchor="middle" font-family="monospace" font-size="14" fill="#a5b4fc">Rust</text>
    <rect x="100" y="0" width="100" height="30" rx="6" fill="#6366f1" opacity="0.2"/>
    <text x="150" y="20" text-anchor="middle" font-family="monospace" font-size="14" fill="#a5b4fc">SQLite</text>
    <rect x="220" y="0" width="80" height="30" rx="6" fill="#6366f1" opacity="0.2"/>
    <text x="260" y="20" text-anchor="middle" font-family="monospace" font-size="14" fill="#a5b4fc">MCP</text>
    <rect x="320" y="0" width="170" height="30" rx="6" fill="#6366f1" opacity="0.2"/>
    <text x="405" y="20" text-anchor="middle" font-family="monospace" font-size="14" fill="#a5b4fc">Claude Code</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="630" width="1280" height="10" fill="url(#g)" opacity="0.6"/>
</svg>
